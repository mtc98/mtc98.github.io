<!DOCTYPE html>
<html>

<head>
    <title>3D 地圖實驗</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            background-color: #fff9e6;
        }

        #header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgb(34, 34, 150);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: Arial, sans-serif;
            font-size: 22px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #map-container {
            position: relative;
            margin-top: 80px; /* 與 header 保持距離 */
            border-radius: 10px;
            height: calc(100% - 100px); /* 設置地圖容器高度，減去 header 和 padding 的空間 */
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.4);
            border-radius: 20px; /* 地圖容器圓角 */
            overflow: hidden; /* 隱藏溢出部分 */
        }
        #map-container > div {
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="header">台中景點</div>
    <div id="map-container">
    <script async defer>
        (g => { var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window; b = b[c] || (b[c] = {}); var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => { await (a = m.createElement("script")); e.set("libraries", [...r] + ""); for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]); e.set("callback", c + ".maps." + q); a.src = `https://maps.${c}apis.com/maps/api/js?` + e; d[q] = f; a.onerror = () => h = n(Error(p + " could not load.")); a.nonce = m.querySelector("script[nonce]")?.nonce || ""; m.head.append(a) })); d[l] ? console.warn(p + " only loads once. Ignoring:", g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)) })({
            key: "AIzaSyDhFmyyK0ipeOreWD1D7Ry4wEE53EudGdA",
            v: "alpha",
        });
    </script>
    <script>
        let map3D = null;
        async function init() {
            const { Map3DElement, MapMode, Marker3DElement,Marker3DInteractiveElement  } = await google.maps.importLibrary("maps3d");
            // 台中市政府位置
            // const taichungCityHall = { lat: 24.163261, lng: 120.647601, altitude: 200 };
            const taichungCityHall = { lat: 24.167921, lng: 120.639110, altitude: 200 };
           const taichungCamera = {
           center: taichungCityHall,
           range: 30000,
           tilt: 33,
           heading: 14.36,
       };
            // 初始化地圖
            map3D = new Map3DElement({
                // center: { lat: 24.147736, lng: 120.673648, altitude: 400 },
                center: { lat: 24.167921, lng: 120.639110, altitude: 200 },
                range: 30000,
                tilt: 30,
                mode: MapMode.HYBRID,
            });

            // 新增 3D 標記
            const marker = new Marker3DInteractiveElement({
                //  秋紅谷 ： 24.167921, 120.639110
                // position: { lat: 24.163261, lng: 120.647601, altitude: 200 },
                position: { lat: 24.167921, lng: 120.639110, altitude: 200 },

                label: "秋紅谷",
                altitudeMode: "ABSOLUTE",
                extruded: true,
            });

            marker.addEventListener('gmp-click', (event) => {
               map3D.flyCameraTo({
                   endCamera: {
                       center: marker.position,
                       tilt: 65,
                       range: 700,
                       heading: 10,
                   },
                   durationMillis: 5000,
               });

               map3D.addEventListener('gmp-animationend', () => {
                   map3D.flyCameraAround({
                       camera: {
                           center: marker.position,
                           tilt: 65,
                           range: 700,
                           heading: 10,
                       },
                       durationMillis: 7000,
                       rounds: 1
                   });
                   map3D.addEventListener('gmp-animationend', () => {
                           map3D.flyCameraTo({
                               endCamera: taichungCamera,
                               durationMillis: 5000,
                           });
                        }, { once: true });
               }, { once: true });

               event.stopPropagation();
           });

            map3D.append(marker); // 使用 append 方法添加標記
            document.querySelector("#map-container").append(map3D);
        }

        init();
    </script>
    </div>
</body>

</html>
